<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<link rel="icon" href="favicon.ico">

<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="container">
<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<!-- DISPLAY -->
<div class="calculator-display mb-3">

<div id="expression" class="text-end text-muted small"></div>

<div id="result" class="text-end fs-2 fw-bold">0</div>

</div>

<!-- BUTTON GRID -->
<div class="calculator-buttons">

<button class="btn btn-danger" data-action="clear">C</button>
<button class="btn btn-danger" data-action="clear-entry">CE</button>
<button class="btn btn-secondary" data-action="backspace">⌫</button>
<button class="btn btn-warning" data-operator="/">÷</button>

<button class="btn btn-light" data-number="7">7</button>
<button class="btn btn-light" data-number="8">8</button>
<button class="btn btn-light" data-number="9">9</button>
<button class="btn btn-warning" data-operator="*">×</button>

<button class="btn btn-light" data-number="4">4</button>
<button class="btn btn-light" data-number="5">5</button>
<button class="btn btn-light" data-number="6">6</button>
<button class="btn btn-warning" data-operator="-">-</button>

<button class="btn btn-light" data-number="1">1</button>
<button class="btn btn-light" data-number="2">2</button>
<button class="btn btn-light" data-number="3">3</button>
<button class="btn btn-warning" data-operator="+">+</button>

<button class="btn btn-light" data-action="plusminus">±</button>
<button class="btn btn-light" data-number="0">0</button>
<button class="btn btn-light" data-action="decimal">.</button>
<button class="btn btn-primary" data-action="equals">=</button>

</div>

</div>
</div>

</div>

</div>
</div>
</div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
